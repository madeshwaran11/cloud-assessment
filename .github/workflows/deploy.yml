name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create SSH Private Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Copy Website Files to EC2
        run: |
          scp -o StrictHostKeyChecking=no \
          -i private_key.pem \
          website/* \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/

      - name: Deploy Website on EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i private_key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            sudo cp /home/ubuntu/index.html /var/www/html/
            sudo cp /home/ubuntu/style.css /var/www/html/
            sudo cp /home/ubuntu/script.js /var/www/html/
            sudo systemctl restart apache2
          EOF